# Subtitle Word Frequency Analyzer Configuration
# This file controls how subtitle files are processed and analyzed

# =============================================================================
# PATH CONFIGURATION
# =============================================================================

paths:
  # Directory containing subtitle (.srt) files
  subtitles_directory: "../../../subtitles"
  
  # Directory where reports will be saved
  output_directory: "../../data/output"
  
  # File containing stopwords (common words to ignore)
  stopwords_file: "./stopwords_spanish.txt"

# =============================================================================
# PROCESSING OPTIONS
# =============================================================================

processing:
  # Minimum word length to consider (shorter words are ignored)
  min_word_length: 2
  
  # Whether to keep accented characters (á, é, í, ó, ú, ñ)
  # Set to true for Spanish, French, Portuguese, etc.
  keep_accents: true
  
  # Convert all words to lowercase for consistency
  lowercase: true

# =============================================================================
# FREQUENCY ANALYSIS
# =============================================================================

frequency:
  # Frequency threshold mode: "auto" or "manual"
  # - "auto": Automatically calculate threshold based on dataset size
  # - "manual": Use the min_frequency value below
  threshold_mode: "auto"
  
  # Minimum frequency for a word to be included (used when threshold_mode is "manual")
  # Words appearing fewer times than this will be excluded
  min_frequency: 3
  
  # Target number of words in final output (used when threshold_mode is "auto")
  # The analyzer will calculate a smart threshold to get approximately this many words
  target_words: 500
  
  # Maximum number of words to include in reports
  max_results: 1000

# =============================================================================
# OUTPUT CONFIGURATION
# =============================================================================

output:
  # Which report formats to generate
  generate_csv: true        # CSV file with word, frequency, percentage
  generate_markdown: true   # Human-readable summary report
  generate_anki_list: true  # Simple word list for Anki import
  
  # Number of top words to display in markdown summary
  # Set to a number to limit (e.g., 50), or leave as "all" to show all words
  # Note: Currently shows all words that meet the frequency threshold
  markdown_top_n: all
  
  # Include frequency as comment in Anki word list
  # Example: "palabra	# frequency: 42"
  anki_include_frequency: true

# =============================================================================
# TRANSLATION OPTIONS
# =============================================================================

translation:
  # Enable automatic translation after analysis
  # Requires DEEPL_API_KEY in .env file
  # Can be overridden with --translate command-line flag
  enabled: false
  
  # Source language code (language of subtitles)
  # Common codes: ES (Spanish), FR (French), DE (German), IT (Italian), PT (Portuguese)
  source_lang: "ES"
  
  # Target language code (language to translate to)
  # Common codes: EN-US (English US), EN-GB (English UK), DE, FR, ES, IT, PT-BR
  target_lang: "EN-US"
  
  # Output filename for translated words (relative to output_directory)
  output_filename: "translated_words.txt"

# =============================================================================
# ADVANCED OPTIONS
# =============================================================================

advanced:
  # File pattern to match in subtitle directory
  file_pattern: "*.srt"
  
  # Encoding to try when reading subtitle files (in order)
  # Most subtitle files use UTF-8, but some may use other encodings
  encodings:
    - "utf-8"
    - "latin-1"
    - "cp1252"
  
  # Show progress information while processing
  verbose: true
